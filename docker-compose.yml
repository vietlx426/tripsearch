services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tripsearch
      POSTGRES_PASSWORD: tripsearch
      POSTGRES_DB: tripsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tripsearch:tripsearch@postgres:5432/tripsearch?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
